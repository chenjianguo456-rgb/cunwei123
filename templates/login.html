<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>村委资料共享系统 - 登录</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif; }
  .glass { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); }
</style>
</head>
<body class="bg-gradient-to-br from-green-600 to-emerald-800 min-h-screen flex items-center justify-center p-4">
  <div class="glass w-full max-w-md rounded-2xl shadow-2xl p-8 border border-white/20">
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">🏘️</div>
      <h1 class="text-2xl font-bold text-gray-800">村委资料共享系统</h1>
      <p class="text-sm text-gray-500 mt-1">乡村振兴 · 数字化管理</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="mb-4 p-3 rounded-lg text-sm text-center {{ 'bg-red-100 text-red-700' if category=='error' else 'bg-green-100 text-green-700' }}">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST" action="/login" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
        <input type="text" name="username" required placeholder="请输入用户名"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-green-500 focus:ring-2 focus:ring-green-200 outline-none transition">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
        <input type="password" name="password" required placeholder="请输入密码"
          class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-green-500 focus:ring-2 focus:ring-green-200 outline-none transition">
      </div>
      <button type="submit" class="w-full bg-gradient-to-r from-green-600 to-emerald-600 text-white font-bold py-3 rounded-xl shadow-lg hover:shadow-xl active:scale-95 transition transform">
        登 录
      </button>
    </form>
    <div class="mt-6 text-center text-xs text-gray-400 space-y-1">
      <p>建议使用 Chrome / Safari 浏览器</p>
      <p class="pt-2">
        <a href="/register" class="text-green-600 hover:underline font-medium">还没有账号？注册普通用户</a>
      </p>
    </div>
  </div>
</body>
</html>
